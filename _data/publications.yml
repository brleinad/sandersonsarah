#
# 1. Copy an existing entry below.
# 2. Change year, text, doi, and status.
# 3. Use **bold** for your name, *italics* for journal/species names.
# 4. Set status to "published" or "in_review".
# 5. Leave doi blank (remove the line) for in-review papers.
#
# Published papers are automatically grouped by year, newest first.

