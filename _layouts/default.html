<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="cento-header">
    <div class="container">
      <div class="logo">
        <a href="index.html"><span id="wsite-title">SARAH SANDERSON, PHD CANDIDATE</span></a>
      </div>
      <a class="hamburger" aria-label="Menu" href="#"><span></span></a>
    </div>
    <div class="nav-wrap">
      <div class="container">
        <div class="nav desktop-nav">
          <ul>
            <li{% if page.active == 'home' %} class="active"{% endif %}><a href="index.html">Home</a></li>
            <li{% if page.active == 'research' %} class="active"{% endif %}><a href="research.html">Research</a></li>
            <li{% if page.active == 'contact' %} class="active"{% endif %}><a href="contact.html">Contact</a></li>
            <li{% if page.active == 'publications' %} class="active"{% endif %}><a href="publications.html">Publications</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  {{ content }}

  <div class="footer-wrap">
    <div class="container">
      <div class="footer"></div>
    </div>
  </div>
</div>

<!-- Mobile nav -->
<div class="nav mobile-nav">
  <ul>
    <li{% if page.active == 'home' %} class="active"{% endif %}><a href="index.html">Home</a></li>
    <li{% if page.active == 'research' %} class="active"{% endif %}><a href="research.html">Research</a></li>
    <li{% if page.active == 'contact' %} class="active"{% endif %}><a href="contact.html">Contact</a></li>
    <li{% if page.active == 'publications' %} class="active"{% endif %}><a href="publications.html">Publications</a></li>
  </ul>
</div>

<!-- Lightbox -->
<div id="lightbox-overlay" class="lightbox-overlay">
  <span id="lightbox-close" class="lightbox-close">&#215;</span>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption" class="lightbox-caption"></div>
</div>

<script src="main.js"></script>
</body>
</html>
